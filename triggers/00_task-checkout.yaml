---
apiVersion: v1
kind: Secret 
metadata:
  name: gitlab-auth-secret
  annotations:
    tekton.dev/git-0: http://192.168.122.130
type: kubernetes.io/basic-auth
stringData:
  username: root
  password: dy6545286
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-sa
  namespace: default
imagePullSecrets:
  - name: harbor-secret
secrets:
  - name: gitlab-auth-secret
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: checkout
spec:
  params:
  - name: git-repo
    type: string
    description: "请输入git repo"
    default: "http://gitlab.devops.io/root/hello-springboot.git"
  - name: branch
    type: string
    description: "请输入git branch"
    default: "main"
  results:
  - name: tag
    description: "镜像tag"
  
  workspaces:
  - name: source
    mountPath: /workspace/source
  steps:
  - name: checkout
    image: harbor.devops.io/devops/alpine-git:v2.32.0
    env:
    # 从 Secret 读取认证信息
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: gitlab-auth-secret
          key: username
    - name: GIT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: gitlab-auth-secret
          key: password
    workingDir: /workspace/source
    script: |
      #!/bin/sh
      set -e
      
      # 添加 hosts 解析
      echo "192.168.122.130 gitlab.devops.io" >> /etc/hosts
      
      echo "Current working directory: $(pwd)"
      echo "Directory contents:"
      ls -la
      
      # 构建带认证的 URL
      REPO_URL=$(params.git-repo)
      AUTH_URL=$(echo "$REPO_URL" | sed "s|://|://${GIT_USERNAME}:${GIT_PASSWORD}@|")
      
      echo "Cloning from: $(echo $AUTH_URL | sed 's/\/\/.*@/\/\//')"  # 隐藏密码显示
      
      # 配置 Git（简化配置，不需要复杂的 credential helper）
      git config --global http.sslVerify false
      
      # 判断当前目录是否为空
      if [ -z "$(ls -A)" ]; then
        echo "Directory is empty, cloning repository..."
        git clone -b $(params.branch) "$AUTH_URL" .
        echo "Clone successfully"
      else
        echo "Directory is not empty, cleaning and re-cloning..."
        # 删除所有文件和目录（包括隐藏文件）
        rm -rf ./*
        rm -rf ./.??* 2>/dev/null || true
        echo "Directory cleaned, cloning repository..."
        git clone -b $(params.branch) "$AUTH_URL" .
      fi

      # 获取 Git 信息
      GIT_COMMIT_SHORT=$(git rev-parse --short=7 HEAD)
      BRANCH=$(git rev-parse --abbrev-ref HEAD)
      echo "Git Short Commit: ${GIT_COMMIT_SHORT}"
      echo "Git Commit Branch: ${BRANCH}"
      tag=${BRANCH}-${GIT_COMMIT_SHORT}
      echo -n ${tag} | tee $(results.tag.path)
      
      echo "========================================="
      echo "Checkout completed successfully!"
      echo "Tag: ${tag}"
      echo "========================================="